name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-core:
    name: Core Library (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Build Core
        run: swift build
      - name: Run Tests
        run: swift test

  macos-full:
    name: Full Build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Build Core
        run: swift build
      - name: Run Core Tests
        run: swift test
      - name: Build macOS App
        run: |
          xcodebuild build \
            -project macOS/PhantomKeyMac.xcodeproj \
            -scheme PhantomKeyMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            || echo "::warning::macOS app build requires Xcode project setup"
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project iOS/PhantomKeyiOS.xcodeproj \
            -scheme PhantomKeyiOS \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            || echo "::warning::iOS app build requires Xcode project setup"
