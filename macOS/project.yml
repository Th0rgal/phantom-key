name: PhantomKeyMac
options:
  bundleIdPrefix: md.thomas.phantomkey
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  PhantomKeyCore:
    path: ..
targets:
  PhantomKeyMac:
    type: application
    platform: macOS
    sources:
      - path: PhantomKeyMac
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: PhantomKeyCore
        product: PhantomKeyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.thomas.phantomkey.mac
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_CFBundleDisplayName: "PhantomKey"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: PhantomKey
        ENABLE_HARDENED_RUNTIME: false
