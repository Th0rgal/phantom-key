name: PhantomKeyMac
options:
  bundleIdPrefix: md.thomas.phantomkey
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  PhantomKeyCore:
    path: ..
targets:
  PhantomKeyMac:
    type: application
    platform: macOS
    sources:
      - path: PhantomKeyMac
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: PhantomKeyCore
        product: PhantomKeyCore
      - target: PhantomKeyDriver
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.thomas.phantomkey.mac
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_CFBundleDisplayName: "PhantomKey"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BQ6Z84B8L5
        PRODUCT_NAME: PhantomKey
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: PhantomKeyMac.entitlements
  PhantomKeyDriver:
    type: driver-extension
    platform: macOS
    sources:
      - path: PhantomKeyDriver
        excludes:
          - "**/.DS_Store"
          - "*.entitlements"
    dependencies:
      - sdk: HIDDriverKit.framework
      - sdk: DriverKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.thomas.phantomkey.mac.driver
        PRODUCT_NAME: PhantomKeyDriver
        SDKROOT: driverkit
        DRIVERKIT_DEPLOYMENT_TARGET: "21.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BQ6Z84B8L5
        CODE_SIGN_ENTITLEMENTS: PhantomKeyDriver.entitlements
        INFOPLIST_FILE: PhantomKeyDriver/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        HEADER_SEARCH_PATHS:
          - "$(DERIVED_SOURCES_DIR)"
