name: PhantomKeyiOS
options:
  bundleIdPrefix: md.thomas.phantomkey
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  PhantomKeyCore:
    path: ..
targets:
  PhantomKeyiOS:
    type: application
    platform: iOS
    sources:
      - path: PhantomKeyiOS
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: PhantomKeyCore
        product: PhantomKeyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: md.thomas.phantomkey.ios
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "PhantomKey"
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "PhantomKey uses Bluetooth to communicate with your Mac as a FIDO2 security key."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "PhantomKey uses Face ID to verify your identity when signing authentication requests."
        INFOPLIST_KEY_NSCameraUsageDescription: "PhantomKey uses the camera to scan QR codes for pairing with your Mac."
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: PhantomKey
